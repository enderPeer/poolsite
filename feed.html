<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoolSite — Newsfeed</title>
<meta name="description" content="Der PoolSite Newsfeed — teile Beiträge mit der Community.">
<link rel="stylesheet" href="assets/app.css">
</head>
<body>

<header>
  <div class="wrap nav">
    <a class="logo" href="index.html"><span class="logo-mark">P</span> PoolSite</a>
    <a class="back" href="index.html">← Zurück zur Website</a>
  </div>
</header>
<div class="beta-banner" id="mode-banner">Verbinde…</div>
<nav id="app-nav" class="appnav" style="display:none"></nav>

<main>
  <div class="wrap">
    <div class="feed-col">
      <h1 class="page-title">Newsfeed</h1>
      <p class="page-sub">Teile Neuigkeiten mit der Community. Bezahlte Aktionen erhöhen deinen Burn (Commitment B) und damit dein Standing.</p>

      <div class="composer">
        <div class="avatar-sm" id="comp-avatar"><span>?</span></div>
        <div style="flex:1">
          <textarea id="post-text" maxlength="500" placeholder="Was gibt's Neues?" oninput="updateCount()"></textarea>
          <div class="img-preview" id="img-preview" style="display:none">
            <img id="img-preview-el" alt="Bildvorschau">
            <button class="img-remove" title="Bild entfernen" onclick="removeImage()">✕</button>
            <span class="img-size" id="img-size"></span>
          </div>
          <div class="composer-foot">
            <span class="count"><span id="char-count">0</span>/500 · Posten kostet <span class="burn-chip" id="post-price">—</span></span>
            <span style="display:flex; gap:8px">
              <button class="pill-btn" title="Bild anhängen" onclick="document.getElementById('img-file').click()">📷 Bild</button>
              <button class="btn small" onclick="createPost()">Posten</button>
            </span>
          </div>
          <input type="file" id="img-file" accept="image/*" style="display:none" onchange="pickImage(this)">
          <div class="msg" id="msg-post"></div>
        </div>
      </div>

      <div id="posts"><div class="feed-empty">Lade Feed…</div></div>
    </div>
  </div>
</main>

<script src="assets/app-core.js"></script>
<script>
var openComments = {};

function updateCount() {
  document.getElementById('char-count').textContent = document.getElementById('post-text').value.length;
}

function setMsg(text, type) {
  var el = document.getElementById('msg-post');
  el.className = 'msg' + (text ? ' ' + type : '');
  el.textContent = text || '';
}

var social = { friends: {}, out: {}, incoming: {} };

function loadSocial() {
  return PS.friends().then(function (d) {
    if (d.local) return;
    social = { friends: {}, out: {}, incoming: {} };
    d.friends.forEach(function (u) { social.friends[u.key] = 1; });
    d.requestsOut.forEach(function (u) { social.out[u.key] = 1; });
    d.requestsIn.forEach(function (u) { social.incoming[u.key] = 1; });
  }).catch(function () {});
}

function friendButton(authorKey) {
  var me = PS.me();
  if (PS.getMode() !== 'server' || !me || authorKey === me.key) return '';
  if (social.friends[authorKey]) return '<a class="pill-btn" href="chat.html?u=' + authorKey + '" title="Ihr seid befreundet — zum Chat">💬</a>';
  if (social.out[authorKey]) return '<span class="pill-btn" style="opacity:.55" title="Anfrage gesendet">✓</span>';
  if (social.incoming[authorKey]) return '<button class="pill-btn primary" onclick="acceptFromFeed(\'' + authorKey + '\')" title="Freundschaftsanfrage annehmen">Annehmen</button>';
  return '<button class="pill-btn" onclick="addFriendFromFeed(\'' + authorKey + '\')" title="Freundschaft anfragen">＋ Freund</button>';
}

function addFriendFromFeed(k) {
  PS.requestFriend(k).then(function (d) {
    setMsg(d.becameFriends ? 'Ihr seid jetzt befreundet! 🎉' : 'Freundschaftsanfrage gesendet. ✓', 'ok');
    return refresh();
  }).catch(function (e) { setMsg(e.message, 'error'); });
}

function acceptFromFeed(k) {
  PS.acceptFriend(k).then(function () {
    setMsg('Ihr seid jetzt befreundet! 🎉', 'ok');
    return refresh();
  }).catch(function (e) { setMsg(e.message, 'error'); });
}

function refresh() {
  PS.renderNav('feed');
  return loadSocial().then(PS.posts).then(renderPosts).catch(function (e) {
    document.getElementById('posts').innerHTML = '<div class="feed-empty">Feed konnte nicht geladen werden: ' + PS.escapeHtml(e.message) + '</div>';
  });
}

/* Bild auf dem Gerät verkleinern & komprimieren, bevor irgendetwas hochgeladen wird */
var pendingImage = null;

function compressImage(file, cb) {
  var reader = new FileReader();
  reader.onload = function (e) {
    var img = new Image();
    img.onload = function () {
      var MAX_EDGE = 1280;
      var scale = Math.min(1, MAX_EDGE / Math.max(img.width, img.height));
      var canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      // Qualität schrittweise senken, bis das Bild klein genug ist
      var quality = 0.8;
      var dataUrl = canvas.toDataURL('image/jpeg', quality);
      while (dataUrl.length > 500 * 1024 && quality > 0.35) {
        quality -= 0.15;
        dataUrl = canvas.toDataURL('image/jpeg', quality);
      }
      cb(dataUrl, file.size, dataUrl.length);
    };
    img.onerror = function () { setMsg('Bild konnte nicht gelesen werden.', 'error'); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function pickImage(input) {
  var file = input.files && input.files[0];
  input.value = '';
  if (!file) return;
  if (!/^image\//.test(file.type)) { setMsg('Bitte wähle eine Bilddatei aus.', 'error'); return; }
  compressImage(file, function (dataUrl, origBytes, newBytes) {
    pendingImage = dataUrl;
    document.getElementById('img-preview').style.display = '';
    document.getElementById('img-preview-el').src = dataUrl;
    var saved = Math.max(0, Math.round((1 - newBytes / Math.max(origBytes, 1)) * 100));
    document.getElementById('img-size').textContent =
      Math.round(origBytes / 1024) + ' KB → ' + Math.round(newBytes / 1024) + ' KB (' + saved + ' % gespart)';
    setMsg('', '');
  });
}

function removeImage() {
  pendingImage = null;
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('img-preview-el').src = '';
}

function createPost() {
  var ta = document.getElementById('post-text');
  var text = ta.value.trim();
  if (!text && !pendingImage) { setMsg('Schreib etwas oder füge ein Bild hinzu.', 'error'); return; }
  PS.addPost(text, pendingImage).then(function () {
    ta.value = '';
    removeImage();
    updateCount();
    setMsg('Beitrag veröffentlicht — ' + PS.fmtEur(PS.PRICES.post) + ' Burn → Commitment B. ✓', 'ok');
    return refresh();
  }).catch(function (e) { setMsg(e.message, 'error'); });
}

function doReact(id, kind) {
  PS.react(id, kind).then(function () { setMsg('', ''); return refresh(); })
    .catch(function (e) { setMsg(e.message, 'error'); });
}

function toggleComments(id) {
  openComments[id] = !openComments[id];
  PS.posts().then(renderPosts).then(function () {
    if (openComments[id]) {
      var inp = document.getElementById('c-input-' + id);
      if (inp) inp.focus();
    }
  });
}

function addComment(id) {
  var inp = document.getElementById('c-input-' + id);
  var text = (inp.value || '').trim();
  if (!text) return;
  PS.addComment(id, text).then(function () {
    setMsg('', '');
    return refresh();
  }).then(function () {
    var inp2 = document.getElementById('c-input-' + id);
    if (inp2) inp2.focus();
  }).catch(function (e) { setMsg(e.message, 'error'); });
}

function deleteComment(postId, commentId) {
  PS.delComment(postId, commentId).then(refresh);
}

function deletePost(id) {
  if (!confirm('Beitrag löschen? (Der Burn bleibt — Commitment ist unwiderruflich.)')) return;
  PS.delPost(id).then(refresh).catch(function (e) { setMsg(e.message, 'error'); });
}

function commentHtml(post, meKey) {
  var rows = post.comments.map(function (c) {
    return '<div class="comment">' +
      '<div class="avatar-xs">' + PS.avatarHtml(c.author) + '</div>' +
      '<div class="c-body">' +
        '<div class="c-head"><span class="c-name">' + PS.escapeHtml(c.author.name) + '</span>' +
        '<span class="c-when">' + PS.timeAgo(c.createdAt) + '</span></div>' +
        '<div class="c-text">' + PS.escapeHtml(c.text) + '</div>' +
      '</div>' +
      (c.authorKey === meKey ? '<button class="c-del" title="Kommentar löschen" onclick="deleteComment(\'' + post.id + '\',\'' + c.id + '\')">✕</button>' : '') +
    '</div>';
  }).join('');
  return '<div class="comments">' + rows +
    '<div class="comment-form">' +
      '<input type="text" id="c-input-' + post.id + '" maxlength="300" placeholder="Kommentieren (' + PS.fmtEur(PS.PRICES.comment) + ')…" ' +
        'onkeydown="if(event.key===\'Enter\')addComment(\'' + post.id + '\')">' +
      '<button onclick="addComment(\'' + post.id + '\')">Senden</button>' +
    '</div>' +
  '</div>';
}

function renderPosts(posts) {
  var host = document.getElementById('posts');
  var me = PS.me();
  var meKey = me ? me.key : null;

  if (!posts.length) {
    host.innerHTML = '<div class="feed-empty">Noch keine Beiträge. Sei die erste Stimme im Feed! 🚀</div>';
    return;
  }

  host.innerHTML = posts.map(function (p) {
    var liked = p.likes.indexOf(meKey) >= 0;
    var disliked = p.dislikes.indexOf(meKey) >= 0;
    return '<div class="post">' +
      '<div class="post-head">' +
        '<div class="avatar-sm">' + PS.avatarHtml(p.author) + '</div>' +
        '<div class="who">' +
          '<div class="name">' + PS.escapeHtml(p.author.name) + '</div>' +
          '<div class="when">' + PS.timeAgo(p.createdAt) + '</div>' +
        '</div>' +
        friendButton(p.authorKey) +
      '</div>' +
      (p.text ? '<div class="post-text">' + PS.escapeHtml(p.text) + '</div>' : '') +
      (p.image ? '<img class="post-img" src="' + p.image + '" alt="Beitragsbild" loading="lazy" onclick="this.classList.toggle(\'expanded\')">' : '') +
      '<div class="post-actions">' +
        '<button class="' + (liked ? 'liked' : '') + '" title="Like (' + PS.fmtEur(PS.PRICES.like) + ')" onclick="doReact(\'' + p.id + '\',\'likes\')">' +
          (liked ? '♥' : '♡') + ' ' + (p.likes.length || '') + '</button>' +
        '<button class="' + (disliked ? 'disliked' : '') + '" title="Dislike (' + PS.fmtEur(PS.PRICES.dislike) + ')" onclick="doReact(\'' + p.id + '\',\'dislikes\')">' +
          '👎 ' + (p.dislikes.length || '') + '</button>' +
        '<button onclick="toggleComments(\'' + p.id + '\')">💬 ' + (p.comments.length || '') + '</button>' +
        (p.authorKey === meKey ? '<button onclick="deletePost(\'' + p.id + '\')">🗑</button>' : '') +
        '<span class="price-tag">Like/Dislike ' + PS.fmtEur(PS.PRICES.like) + ' · Kommentar ' + PS.fmtEur(PS.PRICES.comment) + '</span>' +
      '</div>' +
      (openComments[p.id] ? commentHtml(p, meKey) : '') +
    '</div>';
  }).join('');
}

document.addEventListener('DOMContentLoaded', function () {
  PS.init().then(function () {
    PS.modeBanner();
    var me = PS.me();
    if (!me) { location.href = 'app.html'; return; }
    document.getElementById('comp-avatar').innerHTML = PS.avatarHtml(me);
    document.getElementById('post-price').textContent = PS.fmtEur(PS.PRICES.post);
    refresh().then(function () {
      if (location.hash === '#neu') document.getElementById('post-text').focus();
    });
    // Live-Modus: Feed alle 10 Sekunden aktualisieren, damit fremde Beiträge erscheinen
    if (PS.getMode() === 'server') {
      setInterval(function () { PS.posts().then(renderPosts).catch(function () {}); }, 10000);
    }
  });
});
</script>

</body>
</html>
